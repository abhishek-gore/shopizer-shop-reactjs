name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      backup_version:
        description: 'Backup version to restore (leave empty for latest)'
        required: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          
      - name: Find rollback target
        id: target
        run: |
          if [[ -z "${{ github.event.inputs.backup_version }}" ]]; then
            BACKUP=$(aws s3 ls s3://${{ secrets.BACKUP_S3_BUCKET }}/ | sort -r | head -n 1 | awk '{print $2}')
          else
            BACKUP="backup-${{ github.event.inputs.backup_version }}/"
          fi
          echo "backup=$BACKUP" >> $GITHUB_OUTPUT
          
      - name: Restore from backup
        run: |
          aws s3 sync s3://${{ secrets.BACKUP_S3_BUCKET }}/${{ steps.target.outputs.backup }} \
            s3://${{ secrets.PROD_S3_BUCKET }} \
            --delete
            
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} \
            --paths "/*"
