name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '16'

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Cache node_modules
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-
            
      - name: Install dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: npm install --legacy-peer-deps

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-
          
      - name: Run ESLint
        run: npm run lint || echo "Lint check completed"

  test:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-
          
      - name: Install dependencies if cache miss
        run: npm install --legacy-peer-deps
          
      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  security-scan:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-
      
      - name: Run npm audit
        run: npm audit --audit-level=high || true

  build:
    needs: [lint, test, security-scan]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
          
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          key: node-modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: node-modules-${{ runner.os }}-
          
      - name: Install dependencies if cache miss
        run: npm install --legacy-peer-deps
          
      - name: Generate version
        id: version
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            VERSION=$(date +%Y.%m.%d)-${GITHUB_SHA::7}
          else
            VERSION=pr-${{ github.event.pull_request.number }}-${GITHUB_SHA::7}
          fi
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Build application
        run: npm run build
        env:
          REACT_APP_VERSION: ${{ steps.version.outputs.tag }}
          
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.version.outputs.tag }}
          path: build/
          retention-days: 30

  push-to-infra:
    name: Push Artifacts to Infra Repo
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: abhishek-gore/shopizer-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}
          path: build

      - name: Setup Git LFS
        run: git lfs install

      - name: Copy artifacts
        run: |
          rm -rf infra/artifacts/shop/build
          cp -r build infra/artifacts/shop/

      - name: Commit and push
        working-directory: infra
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add artifacts/shop/build
          git commit -m "Update shop artifact from build ${{ github.run_number }}" || echo "No changes"
          git push

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      
      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: build-${{ needs.build.outputs.version }}
          path: build/
          
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
          
      - name: Deploy to S3
        run: |
          aws s3 sync ./build/ s3://${{ secrets.PROD_S3_BUCKET }} \
            --delete \
            --cache-control "public,max-age=31536000,immutable" \
            --exclude "index.html" \
            --exclude "env-config.js"
            
          aws s3 cp ./build/index.html s3://${{ secrets.PROD_S3_BUCKET }}/index.html \
            --cache-control "public,max-age=0,must-revalidate"
            
      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.PROD_CLOUDFRONT_ID }} \
            --paths "/*"

  smoke-tests:
    needs: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: npm install --legacy-peer-deps
          
      - name: Run smoke tests
        run: npm run test:smoke
        env:
          TEST_URL: https://${{ secrets.PROD_DOMAIN }}
          
      - name: Trigger rollback on failure
        if: failure()
        run: echo "Smoke tests failed - manual rollback required"
